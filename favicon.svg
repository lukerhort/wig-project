<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="6" fill="#0d0d11"/>

  <!--
    WIG vehicle — top-down silhouette
    Nose at top (y=2), wide rectangular wings, narrow fuselage pinch,
    then broader horizontal tail at bottom.
    Orientation: flying upward in the frame.
  -->
  <path fill="#d7263d" d="
    M 16 2
    L 31 12
    L 30 17
    L 19 14
    L 21 27
    L 19 29
    L 16 28
    L 13 29
    L 11 27
    L 13 14
    L 2 17
    L 1 12
    Z
  "/>

  <!-- 4 motor nacelles as cut-out circles on the wing -->
  <circle cx="7"  cy="13.5" r="1.5" fill="#0d0d11"/>
  <circle cx="13" cy="14.5" r="1.5" fill="#0d0d11"/>
  <circle cx="19" cy="14.5" r="1.5" fill="#0d0d11"/>
  <circle cx="25" cy="13.5" r="1.5" fill="#0d0d11"/>
</svg>
